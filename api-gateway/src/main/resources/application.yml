spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/ngsi-ld/v1/**]':
                allowedOrigins: ${APPLICATION_CORS_ALLOWED_ORIGINS:http://localhost:3000}
                allowedMethods:
                  - GET
                  - POST
                  - PATCH
                  - PUT
                  - DELETE
                  - HEAD
                  - OPTIONS
                allowedHeaders: "*"

application:
  search-service:
    url: http://localhost:8083
  subscription-service:
    url: http://localhost:8084

management:
  endpoints:
    web:
      exposure:
        include: health,info
    access:
      default: none
  endpoint:
    info:
      access: none
    health:
      access: read_only

logbook:
  format.style: http
  strategy: body-only-if-status-at-least
  minimum-status: 200
  predicate:
    include:
      - path: /ngsi-ld/v1/**

# Default values for sending log data to a Gelf compatible endpoint
# Log data is sent only if the 'gelflogs' Spring profile is active
# application.graylog.host: localhost
# application.graylog.port: 12201
# application.graylog.source: stellio-int
